services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "8002:8000"
      # Port range for generated websites (8010 + run.id)
      - "8010-8210:8010-8210"
    volumes:
      # Mount the sqlite db for persistence
      - ./backend/app.db:/code/backend/app.db
      # Mount the storage directory to see generated runs on host
      - ./storage:/code/storage
    env_file:
      - ./backend/.env
    # Environment variables
    environment:
      - DATABASE_URL=sqlite:///./app.db
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8002
    ports:
      - "3001:3000"
    environment:
      # Ensure the frontend knows where to hit the backend
      # Note: For client-side requests (browser), use localhost
      - NEXT_PUBLIC_API_URL=http://localhost:8002
    depends_on:
      - backend

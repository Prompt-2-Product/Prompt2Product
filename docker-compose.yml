# Docker Compose for Prompt2Product

services:
  ollama:
    image: ollama/ollama:latest
    container_name: p2p-ollama
    restart: always
    volumes:
      - /home/noor/.ollama:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ports:
      - "11434:11434"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend-new
      dockerfile: Dockerfile
    container_name: p2p-backend
    restart: always
    ports:
      - "8002:8000"
      - "8010-8110:8010-8110"
    volumes:
      - ./backend-new/app.db:/app/app.db
      - ./backend-new/storage:/app/storage
      - /home/noor/Prompt2Product/Prompt2Product/finetune/outputs:/home/noor/Prompt2Product/Prompt2Product/finetune/outputs
    environment:
      - DATABASE_URL=sqlite:///./app.db
      - OLLAMA_URL=http://ollama:11434/api/chat
      - ENHANCE_MODEL=qwen2.5:7b-instruct
      - CODER_MODEL=qwen-code-model
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    depends_on:
      ollama:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8002
    container_name: p2p-frontend
    restart: always
    ports:
      - "3001:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8002
    depends_on:
      - backend

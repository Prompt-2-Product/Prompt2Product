<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard | Calculator</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    .glass-card {
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 1rem;
    }

    .mesh-bg {
      background-color: #0c0c0e;
      background-image: radial-gradient(at 0% 0%, hsla(253,16%,12%,1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,20%,1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(339,49%,20%,1) 0, transparent 50%);
      background-attachment: fixed;
    }

    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(16px);
      background: rgba(15, 23, 42, 0.7);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .bento-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .bento-card {
      border-radius: 1.25rem;
      padding: 2rem;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .bento-card:hover {
      transform: translateY(-5px);
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body class="mesh-bg">

<header class="sticky-header py-4 px-8 text-white">
  <h1>Dashboard Calculator</h1>
</header>

<main class="py-12 px-8">
  <!-- Interactive Calculator Interface -->
  <div class="glass-card reveal visible p-6 w-full max-w-md mx-auto text-center">
    <input type="text" id="calculator-display" placeholder="0" readonly class="w-full px-4 py-2 border-b-2 border-white text-3xl font-bold" />
    <div class="mt-4 space-y-2">
      <button class="bg-black text-white py-2 px-4 rounded">C</button>
      <button class="bg-black text-white py-2 px-4 rounded">Bckspc</button>
    </div>
    <div class="mt-4 space-y-2">
      <!-- Row 1 -->
      <button class="bg-black text-white py-2 px-4 rounded">7</button>
      <button class="bg-black text-white py-2 px-4 rounded">8</button>
      <button class="bg-black text-white py-2 px-4 rounded">9</button>
      <button class="bg-black text-white py-2 px-4 rounded">/</button>
    </div>
    <!-- Additional rows for other operations and digits can be added here -->
  </div>

  <!-- Operations Grid -->
  <section class="mt-8 bento-grid">
    <!-- Bento Card Example -->
    <div class="bento-card reveal visible p-4 text-center">
      <h2>Operations</h2>
      <p>Perform calculations efficiently with this grid layout.</p>
    </div>
  </section>

  <!-- Backspace & Clear Options -->
  <div class="mt-8 glass-card reveal visible p-4">
    <h3>Quick Actions</h3>
    <div class="flex flex-wrap gap-2 justify-center">
      <button class="bg-black text-white py-2 px-4 rounded">C</button>
      <button class="bg-black text-white py-2 px-4 rounded">Bckspc</button>
    </div>
  </div>

</main>

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search and Filters</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    .glass-card {
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .mesh-bg {
      background-color: #0c0c0e;
      background-image: 
        radial-gradient(at 0% 0%, hsla(253,16%,12%,1) 0, transparent 50%), 
        radial-gradient(at 50% 0%, hsla(225,39%,20%,1) 0, transparent 50%), 
        radial-gradient(at 100% 0%, hsla(339,49%,20%,1) 0, transparent 50%);
      background-attachment: fixed;
    }

    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(16px);
      background: rgba(15, 23, 42, 0.7);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .bento-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    .bento-card {
      border-radius: 1.25rem;
      padding: 2rem;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .bento-card:hover {
      transform: translateY(-5px);
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body class="mesh-bg">
  <header class="sticky-header glass-card px-4 py-3 text-center">
    <h1 class="text-3xl font-bold">Advanced Search and Filters</h1>
  </header>

  <main class="py-6">
    <!-- Global Search -->
    <div class="glass-card p-4 mb-8">
      <input type="text" id="global-search" placeholder="Search worldwide for the best weather conditions..." class="w-full px-3 py-2 rounded-lg text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500" />
    </div>

    <!-- Location Autocompletion -->
    <div class="glass-card p-4 mb-8">
      <select id="location-autocomplete" class="w-full px-3 py-2 rounded-lg text-gray-700 focus:outline-none focus:ring-2 focus:ring-blue-500">
        <option value="">Select Your Location</option>
        <option value="New York">New York</option>
        <option value="London">London</option>
        <option value="Tokyo">Tokyo</option>
        <option value="Sydney">Sydney</option>
      </select>
    </div>

    <!-- Advanced Filters -->
    <form class="glass-card p-4 mb-8">
      <h2 class="text-lg font-bold mb-3">Advanced Weather Filters</h2>
      <label for="temperature-range" class="block text-sm font-medium text-gray-700 mb-1">Temperature Range:</label>
      <input type="range" id="temperature-range" min="-40" max="40" step="5" value="15" class="w-full h-2 bg-gray-300 rounded-lg appearance-none cursor-pointer" />
      <output for="temperature-range" class="mt-1 text-sm font-medium">15°C</output>

      <div class="flex items-center mt-4">
        <input type="checkbox" id="show-rainy-days"
        checked
        class="mr-2 form-checkbox h-4 w-4 border border-gray-300 rounded shadow-sm text-indigo-600 focus:ring-indigo-500" />
        <label for="show-rainy-days">Show Rainy Days</label>
      </div>

      <div class="flex items-center mt-4">
        <input type="checkbox" id="show-sunny-days"
        checked
        class="mr-2 form-checkbox h-4 w-4 border border-gray-300 rounded shadow-sm text-indigo-600 focus:ring-indigo-500" />
        <label for="show-sunny-days">Show Sunny Days</label>
      </div>

      <button type="submit" class="mt-4 px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500">Apply Filters</button>
    </form>
  </main>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    .glass-card {
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 1rem;
    }

    .mesh-bg {
      background-color: #0c0c0e;
      background-image: 
        radial-gradient(at 0% 0%, hsla(253,16%,12%,1) 0, transparent 50%), 
        radial-gradient(at 50% 0%, hsla(225,39%,20%,1) 0, transparent 50%), 
        radial-gradient(at 100% 0%, hsla(339,49%,20%,1) 0, transparent 50%);
      background-attachment: fixed;
    }

    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(16px);
      background: rgba(15, 23, 42, 0.7);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .bento-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .bento-card {
      border-radius: 1.25rem;
      padding: 2rem;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .bento-card:hover {
      transform: translateY(-5px);
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body class="mesh-bg">

  <header class="sticky-header p-4 text-white">
    <h1 class="text-lg font-bold">Contact Us</h1>
  </header>

  <main class="container mx-auto px-4 py-8">
    <!-- Form Step 1 | type: form-step -->
    <section id="form-step-1" class="reveal mt-8">
      <div class="glass-card p-6">
        <h2 class="text-xl font-bold mb-4">Step 1: Basic Information</h2>
        <form action="#">
          <div class="mb-4">
            <label for="name" class="block text-sm font-medium text-gray-700">Name</label>
            <input type="text" id="name" name="name" class="mt-1 block w-full border rounded-md border-gray-300 shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
          </div>
          <div class="mb-4">
            <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
            <input type="email" id="email" name="email" class="mt-1 block w-full border rounded-md border-gray-300 shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
          </div>
        </form>
      </div>
    </section>

    <!-- Form Step 2 | type: form-step -->
    <section id="form-step-2" class="reveal mt-8">
      <div class="glass-card p-6">
        <h2 class="text-xl font-bold mb-4">Step 2: Detailed Information</h2>
        <form action="#">
          <div class="mb-4">
            <label for="phone" class="block text-sm font-medium text-gray-700">Phone Number</label>
            <input type="tel" id="phone" name="phone" class="mt-1 block w-full border rounded-md border-gray-300 shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
          </div>
          <div class="mb-4">
            <label for="propertyType" class="block text-sm font-medium text-gray-700">Property Type</label>
            <select id="propertyType" name="propertyType" class="mt-1 block w-full border rounded-md border-gray-300 shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
              <option value="">Select Property Type</option>
              <option value="residential">Residential</option>
              <option value="commercial">Commercial</option>
              <option value="industrial">Industrial</option>
            </select>
          </div>
        </form>
      </div>
    </section>

  </main>

</body>
</html>

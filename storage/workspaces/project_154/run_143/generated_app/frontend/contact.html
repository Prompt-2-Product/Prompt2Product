<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    .glass-card {
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 1rem;
    }
  </style>
</head>
<body class="bg-gray-900 text-white p-8">
  <div class="max-w-md mx-auto glass-card p-6 rounded-lg shadow-lg">
    <h1 class="text-3xl font-bold mb-4">Get in Touch</h1>
    <p class="mb-6">Ready to enhance your workflow? Contact us for personalized support and solutions.</p>
    <form action="#" method="POST" class="space-y-4">
      <div>
        <label for="name" class="block text-sm font-medium text-gray-300 mb-1">Name</label>
        <input type="text" id="name" name="name" required class="w-full bg-gray-800 border border-gray-700 rounded p-2 text-white">
      </div>
      <div>
        <label for="email" class="block text-sm font-medium text-gray-300 mb-1">Email</label>
        <input type="email" id="email" name="email" required class="w-full bg-gray-800 border border-gray-700 rounded p-2 text-white">
      </div>
      <div>
        <label for="message" class="block text-sm font-medium text-gray-300 mb-1">Message</label>
        <textarea id="message" name="message" rows="4" required class="w-full bg-gray-800 border border-gray-700 rounded p-2 text-white"></textarea>
      </div>
      <button type="submit" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded">Send</button>
    </form>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeatherApp Forecast</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    .glass-card {
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 1rem;
    }

    .mesh-bg {
      background-color: #0c0c0e;
      background-image: radial-gradient(at 0% 0%, hsla(253,16%,12%,1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,20%,1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(339,49%,20%,1) 0, transparent 50%);
      background-attachment: fixed;
    }

    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(16px);
      background: rgba(15, 23, 42, 0.7);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .bento-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    .bento-card {
      border-radius: 1.25rem;
      padding: 2rem;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .bento-card:hover {
      transform: translateY(-5px);
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body class="mesh-bg">
  <header class="sticky-header">
    <h1>WeatherApp Forecast</h1>
  </header>

  <section class="reveal" id="comprehensive-forecast-details">
    <div class="container mx-auto px-4 py-8">
      <h2>Detailed Weather Insights</h2>
      <p>Get accurate and up-to-date weather information for your location.</p>
    </div>
  </section>

  <section class="reveal bento-grid" id="forecast-cards">
    <div class="container mx-auto px-4 py-8">
      <h2>Weather Cards</h2>
      <div class="bento-card glass-card">
        <h3>Day 1 Forecast</h3>
        <p>Sunny with a high of 75°F.</p>
      </div>
      <div class="bento-card glass-card">
        <h3>Day 2 Forecast</h3>
        <p>Partly cloudy with a high of 80°F.</p>
      </div>
      <div class="bento-card glass-card">
        <h3>Day 3 Forecast</h3>
        <p>Rainy with a high of 65°F.</p>
      </div>
    </div>
  </section>

  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const revealElements = document.querySelectorAll('.reveal');
      window.addEventListener('scroll', () => {
        revealElements.forEach(el => {
          if (el.getBoundingClientRect().top <= window.innerHeight && el.getBoundingClientRect().bottom >= 0) {
            el.classList.add('visible');
          } else {
            el.classList.remove('visible');
          }
        });
      });
    });
  </script>
</body>
</html>

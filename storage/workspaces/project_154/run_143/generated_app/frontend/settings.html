<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settings</title>
<link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<style>
  .glass-card {
    backdrop-filter: blur(12px);
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 1rem;
  }

  .mesh-bg {
    background-color: #0c0c0e;
    background-image: radial-gradient(at 0% 0%, hsla(253,16%,12%,1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,20%,1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(339,49%,20%,1) 0, transparent 50%);
    background-attachment: fixed;
  }

  .sticky-header {
    position: sticky;
    top: 0;
    z-index: 1000;
    backdrop-filter: blur(16px);
    background: rgba(15, 23, 42, 0.7);
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
  }

  .reveal {
    opacity: 0;
    transform: translateY(20px);
    transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .reveal.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .bento-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 1.5rem;
  }
  .bento-card {
    border-radius: 1.25rem;
    padding: 2rem;
    transition: all 0.3s ease;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.05);
  }
  .bento-card:hover {
    transform: translateY(-5px);
    background: rgba(255, 255, 255, 0.06);
    border-color: rgba(255, 255, 255, 0.1);
  }
</style>
</head>
<body class="mesh-bg">
<div class="sticky-header p-4">
  <h1 class="text-white text-3xl font-bold">Settings</h1>
</div>
<div class="container mx-auto px-4 py-6">
  <section class="glass-card reveal mb-8">
    <h2 class="text-lg font-semibold mb-4">Customizable Location Settings</h2>
    <!-- PLACEHOLDER: section_name | type: form -->
    <form class="flex flex-col">
      <div class="mb-4">
        <label for="location" class="block text-sm font-medium text-gray-700">Location:</label>
        <input type="text" id="location" name="location" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
      </div>
    </form>
  </section>

  <section class="glass-card reveal mb-8">
    <h2 class="text-lg font-semibold mb-4">Dark Mode Toggle</h2>
    <!-- PLACEHOLDER: section_name | type: switch -->
    <div class="flex items-center">
      <label for="dark-mode-toggle" class="mr-4">Enable Dark Mode:</label>
      <input id="dark-mode-toggle" type="checkbox" class="toggle-switch">
    </div>
  </section>

  <section class="glass-card reveal mb-8">
    <h2 class="text-lg font-semibold mb-4">Units Selection (Metric/Imperial)</h2>
    <!-- PLACEHOLDER: section_name | type: select -->
    <div class="flex items-center">
      <label for="units" class="mr-4">Select Units:</label>
      <select id="units" name="units" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
        <option value="metric">Metric</option>
        <option value="imperial">Imperial</option>
      </select>
    </div>
  </section>

  <section class="glass-card reveal mb-8">
    <h2 class="text-lg font-semibold mb-4">Notification Settings</h2>
    <!-- PLACEHOLDER: section_name | type: form -->
    <form class="flex flex-col">
      <div class="mb-4">
        <label for="email-notifications" class="block text-sm font-medium text-gray-700">Email Notifications:</label>
        <input type="checkbox" id="email-notifications" name="email-notifications" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
      </div>
    </form>
  </section>

  <section class="glass-card reveal mb-8">
    <h2 class="text-lg font-semibold mb-4">Privacy Settings</h2>
    <!-- PLACEHOLDER: section_name | type: form -->
    <form class="flex flex-col">
      <div class="mb-4">
        <label for="data-access" class="block text-sm font-medium text-gray-700">Data Access:</label>
        <select id="data-access" name="data-access" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
          <option value="public">Public</option>
          <option value="private">Private</option>
        </select>
      </div>
    </form>
  </section>
</div>

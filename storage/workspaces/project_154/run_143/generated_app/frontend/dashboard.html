<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    .glass-card {
      backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 1rem;
    }
    .mesh-bg {
      background-color: #0c0c0e;
      background-image: radial-gradient(at 0% 0%, hsla(253,16%,12%,1) 0, transparent 50%), radial-gradient(at 50% 0%, hsla(225,39%,20%,1) 0, transparent 50%), radial-gradient(at 100% 0%, hsla(339,49%,20%,1) 0, transparent 50%);
      background-attachment: fixed;
    }
    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(16px);
      background: rgba(15, 23, 42, 0.7);
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .reveal {
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
    .bento-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
    }
    .bento-card {
      border-radius: 1.25rem;
      padding: 2rem;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.05);
    }
    .bento-card:hover {
      transform: translateY(-5px);
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(255, 255, 255, 0.1);
    }
  </style>
</head>
<body class="mesh-bg">
  <header class="sticky-header p-4 text-center reveal visible">
    <h1>WeatherApp Dashboard</h1>
  </header>
  <main class="container mx-auto p-6">
    <!-- Interactive Weather Map | type: map -->
    <div class="glass-card p-6 mb-8 reveal" id="weather-map">
      <h2>Interactive Weather Map</h2>
      <p>Visualize current weather conditions and forecasts with ease.</p>
    </div>

    <!-- Filterable Bento-Box Gallery of Local Forecasts | type: gallery -->
    <div class="glass-card p-6 mb-8 reveal" id="weather-gallery">
      <h2>Filterable Weather Forecast Gallery</h2>
      <div class="bento-grid">
        <!-- Bento Card 1 -->
        <div class="bento-card reveal">
          <h3>New York City</h3>
          <p>Temperatures, humidity, and wind predictions.</p>
        </div>
        <!-- Bento Card 2 -->
        <div class="bento-card reveal">
          <h3>Los Angeles</h3>
          <p>Temperature trends and precipitation forecasts.</p>
        </div>
        <!-- Add more cards as needed -->
      </div>
    </div>
  </main>
</body>
</html>
